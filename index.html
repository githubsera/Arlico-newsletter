<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arlico Pharm Weekly Intelligence Brief</title>
<style>
  :root {
    --green-50: #E1F5EE;
    --green-100: #9FE1CB;
    --green-200: #5DCAA5;
    --green-500: #1D9E75;
    --green-600: #0F6E56;
    --green-700: #085041;
    --green-800: #04342C;
    --amber-50: #FAEEDA;
    --amber-200: #EF9F27;
    --amber-600: #854F0B;
    --blue-50: #E6F1FB;
    --blue-200: #85B7EB;
    --blue-600: #185FA5;
    --gray-50: #F7F7F5;
    --gray-100: #EEEDE9;
    --gray-200: #D3D1C7;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-800: #2C2C2A;
    --text-primary: #1a1a18;
    --text-secondary: #5F5E5A;
    --text-muted: #888780;
    --border: rgba(0,0,0,0.1);
    --border-md: rgba(0,0,0,0.15);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--gray-50);
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--green-800);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .brand-mark {
    width: 28px;
    height: 28px;
    background: var(--green-500);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .brand-name {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.2px;
  }
  .brand-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-left: 6px;
    font-weight: 400;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-tag {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    padding: 3px 8px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
  }

  /* ── LAYOUT ── */
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 1.5rem;
    padding: 1.5rem 0 4rem;
    align-items: start;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: sticky;
    top: 68px;
  }
  .sidebar-section {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 10px;
  }
  .sidebar-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .issue-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    text-decoration: none;
    color: inherit;
  }
  .issue-item:last-child { border-bottom: none; }
  .issue-item:hover { background: var(--gray-50); }
  .issue-item.active { background: var(--green-50); }
  .issue-item-inner { flex: 1; }
  .issue-item-week {
    font-size: 11px;
    font-weight: 600;
    color: var(--green-600);
    margin-bottom: 2px;
  }
  .issue-item.active .issue-item-week { color: var(--green-700); }
  .issue-item-date { font-size: 11px; color: var(--text-muted); }
  .issue-count {
    font-size: 11px;
    background: var(--gray-100);
    color: var(--text-muted);
    border-radius: 100px;
    padding: 2px 7px;
    flex-shrink: 0;
  }
  .issue-item.active .issue-count {
    background: var(--green-100);
    color: var(--green-700);
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-secondary);
    transition: background 0.1s;
  }
  .filter-btn:last-child { border-bottom: none; }
  .filter-btn:hover { background: var(--gray-50); }
  .filter-btn.active { color: var(--text-primary); font-weight: 500; }
  .filter-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-all { background: var(--gray-400); }
  .dot-impact { background: var(--green-500); }
  .dot-watch { background: var(--amber-200); }
  .dot-ref { background: var(--blue-200); }
  .filter-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── MAIN ── */
  .main-header {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .issue-week-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: var(--green-600);
    background: var(--green-50);
    border: 1px solid var(--green-100);
    padding: 3px 10px;
    border-radius: 100px;
    margin-bottom: 10px;
  }
  .main-header h1 {
    font-size: 19px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .main-header-sub {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .header-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .header-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 100px;
    background: var(--gray-100);
    color: var(--gray-600);
    border: 1px solid var(--border);
  }
  .header-stats { display: flex; gap: 8px; }
  .stat-pill {
    text-align: center;
    padding: 6px 14px;
    background: var(--gray-50);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    min-width: 64px;
  }
  .stat-n {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
  }
  .stat-l { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

  /* ── CARDS ── */
  .cards-grid {
    display: grid;
    gap: 8px;
  }
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
    border-left-width: 3px;
    position: relative;
  }
  .card:hover { border-color: var(--border-md); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .card.impact { border-left-color: var(--green-500); }
  .card.watch  { border-left-color: var(--amber-200); }
  .card.ref    { border-left-color: var(--blue-200); }
  .card.active { border-color: var(--border-md); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 100px;
  }
  .badge-impact { background: var(--green-50); color: var(--green-600); border: 1px solid var(--green-100); }
  .badge-watch  { background: var(--amber-50); color: var(--amber-600); border: 1px solid #FAC775; }
  .badge-ref    { background: var(--blue-50);  color: var(--blue-600);  border: 1px solid var(--blue-200); }
  .card-cat { font-size: 11px; color: var(--text-muted); }
  .card-date { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .card h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.45;
    margin-bottom: 5px;
  }
  .card-summary {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.65;
  }
  .card-footer {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-src { font-size: 11px; color: var(--text-muted); }
  .card-arrow {
    font-size: 12px;
    color: var(--text-muted);
    transition: transform 0.15s;
  }
  .card:hover .card-arrow { transform: translateX(2px); }

  /* ── DETAIL DRAWER ── */
  .detail-drawer {
    background: #fff;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-lg);
    margin-top: 8px;
    overflow: hidden;
    display: none;
  }
  .detail-drawer.open { display: block; }
  .drawer-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .drawer-header-left { flex: 1; }
  .drawer-badges { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .drawer-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .drawer-close {
    background: var(--gray-100);
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .drawer-close:hover { background: var(--gray-200); }
  .drawer-body { padding: 1rem 1.25rem; }
  .drawer-section { margin-bottom: 1rem; }
  .drawer-section:last-child { margin-bottom: 0; }
  .drawer-section-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
  }
  .drawer-text {
    font-size: 13.5px;
    color: var(--text-primary);
    line-height: 1.75;
  }
  .cso-block {
    background: var(--green-50);
    border: 1px solid var(--green-100);
    border-radius: var(--radius-md);
    padding: 12px 14px;
  }
  .cso-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--green-600);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .cso-text {
    font-size: 13px;
    color: var(--green-700);
    line-height: 1.7;
  }
  .source-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--blue-600);
    text-decoration: none;
    padding: 5px 10px;
    background: var(--blue-50);
    border-radius: var(--radius-sm);
    border: 1px solid var(--blue-200);
    margin-top: 4px;
  }
  .source-link:hover { opacity: 0.8; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ── FOOTER ── */
  .footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 0;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2rem;
  }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .topbar { padding: 0 1rem; }
    .brand-sub { display: none; }
  }
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-brand">
    <div class="brand-mark">ARL</div>
    <span class="brand-name">Arlico Pharm Weekly</span>
    <span class="brand-sub">CSO · ETC Intelligence Brief</span>

  </div>
</nav>

<div class="page">
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">

        </div>
        <div class="filter-btn" onclick="setFilter('ref', this)">
          <span class="filter-dot dot-ref"></span>참고
          <span class="filter-count" id="fc-ref"></span>
        </div>
      </div>

      <div class="sidebar-section" id="issue-list">
        <div class="sidebar-title">발행 목록</div>
        <!-- JS가 렌더링 -->
      </div>
    </aside>

    <!-- MAIN -->
    <main>
      <div class="main-header" id="main-header">
        <!-- JS가 렌더링 -->
      </div>
      <div class="cards-grid" id="cards-container">
        <!-- JS가 렌더링 -->
      </div>
    </main>

  </div>
</div>

<footer class="footer">
  <div class="page">

  </div>
</footer>

/* ============================================================
   앱 로직 (수정 불필요)
   ============================================================ */
let currentIssueIdx = 0;
let currentFilter   = 'all';
let openArticleIdx  = -1;

const badgeMeta = {
  impact: { label: '직접 영향',     cls: 'badge-impact' },
  watch:  { label: '주의 모니터링', cls: 'badge-watch'  },
  ref:    { label: '참고',          cls: 'badge-ref'    }
};

function getIssue() { return ISSUES[currentIssueIdx]; }

function filteredArticles() {
  const issue = getIssue();
  return currentFilter === 'all'
    ? issue.articles
    : issue.articles.filter(a => a.type === currentFilter);
}

function renderSidebar() {
  const list = document.getElementById('issue-list');
  const inner = ISSUES.map((iss, i) => `
    <a class="issue-item ${i === currentIssueIdx ? 'active' : ''}" onclick="setIssue(${i}); return false;" href="#">
      <div class="issue-item-inner">
        <div class="issue-item-week">${iss.week}</div>
        <div class="issue-item-date">${iss.weekRange}</div>
      </div>
      <span class="issue-count">${iss.articles.length}</span>
    </a>
  `).join('');
  list.innerHTML = '<div class="sidebar-title">발행 목록</div>' + inner;
}

function renderFilterCounts() {
  const issue = getIssue();
  document.getElementById('fc-all').textContent    = issue.articles.length;
  document.getElementById('fc-impact').textContent = issue.articles.filter(a=>a.type==='impact').length;
  document.getElementById('fc-watch').textContent  = issue.articles.filter(a=>a.type==='watch').length;
  document.getElementById('fc-ref').textContent    = issue.articles.filter(a=>a.type==='ref').length;
}

function renderHeader() {
  const iss = getIssue();
  const total   = iss.articles.length;
  const impacts = iss.articles.filter(a=>a.type==='impact').length;
  const watches = iss.articles.filter(a=>a.type==='watch').length;
  document.getElementById('main-header').innerHTML = `
    <div class="issue-week-badge">◆ ${iss.week} &nbsp;·&nbsp; ${iss.weekRange}</div>
    <h1>${iss.heroTitle}</h1>
    <p class="main-header-sub">${iss.heroSub}</p>
    <div class="header-meta">
      <div class="header-tags">${iss.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="header-stats">
        <div class="stat-pill"><div class="stat-n">${total}</div><div class="stat-l">주요 이슈</div></div>
        <div class="stat-pill"><div class="stat-n">${impacts}</div><div class="stat-l">직접 영향</div></div>
        <div class="stat-pill"><div class="stat-n">${watches}</div><div class="stat-l">모니터링</div></div>
      </div>
    </div>
  `;
}

function renderCards() {
  const articles = filteredArticles();
  const container = document.getElementById('cards-container');

  if (articles.length === 0) {
    container.innerHTML = `<div class="empty">해당 분류의 이슈가 없습니다.</div>`;
    return;
  }

  container.innerHTML = articles.map((art, idx) => {
    const meta = badgeMeta[art.type];
    const realIdx = getIssue().articles.indexOf(art);
    return `
      <div class="card ${art.type} ${openArticleIdx === realIdx ? 'active' : ''}" onclick="toggleDetail(${realIdx})">
        <div class="card-top">
          <span class="badge ${meta.cls}">${meta.label}</span>
          <span class="card-cat">${art.category}</span>
          <span class="card-date">${art.date}</span>
        </div>
        <h2>${art.title}</h2>
        <p class="card-summary">${art.summary}</p>
        <div class="card-footer">
          <span class="card-src">출처: ${art.source}</span>
          <span class="card-arrow">${openArticleIdx === realIdx ? '▲' : '▼'}</span>
        </div>
      </div>
      ${openArticleIdx === realIdx ? renderDrawer(art) : ''}
    `;
  }).join('');
}

function renderDrawer(art) {
  const meta = badgeMeta[art.type];
  return `
    <div class="detail-drawer open">
      <div class="drawer-header">
        <div class="drawer-header-left">
          <div class="drawer-badges">
            <span class="badge ${meta.cls}">${meta.label}</span>
            <span class="badge" style="background:var(--gray-100);color:var(--gray-600);border:1px solid var(--border)">${art.category}</span>
          </div>
          <div class="drawer-title">${art.title}</div>
        </div>
        <button class="drawer-close" onclick="closeDetail(event)">✕</button>
      </div>
      <div class="drawer-body">
        <div class="drawer-section">
          <div class="drawer-section-title">이슈 요약</div>
          <p class="drawer-text">${art.detail}</p>
        </div>
        <div class="drawer-section">
          <div class="cso-block">
            <div class="cso-label">◆ CSO 영업 영향</div>
            <p class="cso-text">${art.cso}</p>
          </div>
        </div>
        <div class="drawer-section" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <span style="font-size:12px;color:var(--text-muted)">출처: ${art.source} · ${art.date}</span>
          <a class="source-link" href="${art.sourceUrl}" target="_blank" rel="noopener">원문 기사 보기 ↗</a>
        </div>
      </div>
    </div>
  `;
}

function toggleDetail(idx) {
  openArticleIdx = openArticleIdx === idx ? -1 : idx;
  renderCards();
  if (openArticleIdx !== -1) {
    setTimeout(() => {
      const drawers = document.querySelectorAll('.detail-drawer.open');
      if (drawers.length) drawers[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

function closeDetail(e) {
  e.stopPropagation();
  openArticleIdx = -1;
  renderCards();
}

function setIssue(idx) {
  currentIssueIdx = idx;
  currentFilter   = 'all';
  openArticleIdx  = -1;
  document.querySelectorAll('.filter-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  renderAll();
}

function setFilter(type, btn) {
  currentFilter  = type;
  openArticleIdx = -1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderAll() {
  renderSidebar();
  renderFilterCounts();
  renderHeader();
  renderCards();
}

renderAll();
</script>
